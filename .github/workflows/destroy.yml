name: Destroy n8n infra

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY (all caps) to confirm you want to tear down the EC2 instance, EIP, security group, and SSH key secret.'
        required: true

permissions:
  contents: read

concurrency:
  group: n8n-infra-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Confirmation input must be exactly 'DESTROY'. Aborting."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Locate Terraform state bucket
        id: state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "bucket=n8n-tf-state-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.state.outputs.bucket }}" \
            -backend-config="key=n8n-server/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="allowed_ssh_cidr=${{ secrets.SSH_ALLOWED_CIDR != '' && secrets.SSH_ALLOWED_CIDR || '0.0.0.0/0' }}"

      - name: Summary
        run: |
          {
            echo "## n8n infra destroyed"
            echo ""
            echo "The Terraform state bucket (\`${{ steps.state.outputs.bucket }}\`) is left in place so you can redeploy later. For a full cleanup, empty and delete it in the S3 console, then deactivate the IAM user's access key."
          } >> "$GITHUB_STEP_SUMMARY"
