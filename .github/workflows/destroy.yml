name: Destroy n8n infra

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY (all caps) to confirm you want to tear down the EC2 instance, EIP, security group, and SSH key secret.'
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: n8n-infra-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Confirmation input must be exactly 'DESTROY'. Aborting."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=n8n-server/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"

      - name: Terraform destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="allowed_ssh_cidr=${{ secrets.SSH_ALLOWED_CIDR != '' && secrets.SSH_ALLOWED_CIDR || '0.0.0.0/0' }}"

      - name: Summary
        run: echo "## n8n infra destroyed" >> "$GITHUB_STEP_SUMMARY"
