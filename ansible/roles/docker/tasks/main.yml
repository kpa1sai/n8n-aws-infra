---
- name: Wait for cloud-init / apt lock to be free
  ansible.builtin.command: cloud-init status --wait
  changed_when: false
  failed_when: false

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture == 'x86_64' and 'amd64' or ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine + Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add ubuntu user to the docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

# t3.micro has only 1GB RAM; n8n + Postgres + Caddy together can OOM
# without a bit of swap headroom.
- name: Check for existing swap file
  ansible.builtin.stat:
    path: /swapfile
  register: swapfile_stat

- name: Create 2G swap file
  ansible.builtin.command: fallocate -l 2G /swapfile
  when: not swapfile_stat.stat.exists

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  when: not swapfile_stat.stat.exists

- name: Format swap file
  ansible.builtin.command: mkswap /swapfile
  when: not swapfile_stat.stat.exists

- name: Enable swap file
  ansible.builtin.command: swapon /swapfile
  when: not swapfile_stat.stat.exists

- name: Persist swap in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
