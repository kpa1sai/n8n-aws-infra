---
- name: Create install directory
  ansible.builtin.file:
    path: "{{ n8n_install_dir }}"
    state: directory
    mode: "0755"

- name: Create Caddy data directory (persists TLS certs across restarts)
  ansible.builtin.file:
    path: "{{ n8n_install_dir }}/caddy_data"
    state: directory
    mode: "0755"

- name: Write .env file (secrets — root-only readable)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ n8n_install_dir }}/.env"
    mode: "0600"
  no_log: true

- name: Write docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_install_dir }}/docker-compose.yml"
    mode: "0644"

- name: Write Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ n8n_install_dir }}/Caddyfile"
    mode: "0644"

- name: Pull latest images
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ n8n_install_dir }}"
  changed_when: true

- name: (Re)start the stack
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ n8n_install_dir }}"
  changed_when: true
