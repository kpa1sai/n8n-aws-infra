AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-time bootstrap for n8n-aws-infra: Terraform remote state (S3 + DynamoDB) and
  a GitHub OIDC provider + IAM role the deploy pipeline assumes without any stored
  AWS keys. Deployed once via the "Bootstrap n8n infra" GitHub Actions workflow
  using a temporary IAM key that you delete afterward. Safe to re-run (CloudFormation
  updates the existing stack rather than erroring on "already exists").
  See ../README.md for full instructions.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub username or org that owns the repo (case-sensitive).
  GitHubRepo:
    Type: String
    Description: Name of the GitHub repository this pipeline lives in.
  AllowedBranch:
    Type: String
    Default: refs/heads/main
    Description: >
      Git ref allowed to assume the deploy role. Use "*" to allow any branch/PR
      (less strict).

Conditions:
  AllowAnyBranch: !Equals [!Ref AllowedBranch, "*"]

Resources:
  # ---------------------------------------------------------------------------
  # Terraform remote state backend
  # ---------------------------------------------------------------------------

  TfStateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "n8n-tfstate-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  TfLockTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "n8n-tfstate-${AWS::AccountId}-${AWS::Region}-lock"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockID
          Type: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH

  # ---------------------------------------------------------------------------
  # GitHub OIDC provider + deploy role
  #
  # NOTE: an AWS account can only have one OIDC provider per URL. If this
  # account already has a token.actions.githubusercontent.com provider from an
  # unrelated project, this resource will fail with EntityAlreadyExists — remove
  # this resource and point GithubActionsDeployRole's trust policy at the
  # existing provider's ARN instead.
  # ---------------------------------------------------------------------------

  GithubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GithubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "github-actions-${GitHubRepo}-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GithubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !If
                  - AllowAnyBranch
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:${AllowedBranch}"
      Policies:
        - PolicyName: deploy-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EC2Full
                Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                  - ec2:ImportKeyPair
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  - ec2:ModifyInstanceMetadataOptions
                  - ec2:ModifyInstanceAttribute
                Resource: "*"
              - Sid: SecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecret
                  - secretsmanager:TagResource
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:*"
              - Sid: StateBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TfStateBucket.Arn
                  - !Sub "${TfStateBucket.Arn}/*"
              - Sid: LockTable
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt TfLockTable.Arn

Outputs:
  RoleArn:
    Description: Put this in the AWS_ROLE_ARN GitHub secret.
    Value: !GetAtt GithubActionsDeployRole.Arn
  StateBucket:
    Description: Put this in the TF_STATE_BUCKET GitHub secret.
    Value: !Ref TfStateBucket
  LockTable:
    Description: Put this in the TF_STATE_DYNAMODB_TABLE GitHub secret.
    Value: !Ref TfLockTable
